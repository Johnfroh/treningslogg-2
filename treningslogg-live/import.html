<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treningslogg — desktop · Bodø Jiu Jitsu</title>

<meta name="description" content="Desktop-side for Spond-import">
<meta name="theme-color" content="#373F43">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">

<style>
  html, body { margin: 0; background: #F5F0E8; font-family: 'Roboto Mono', monospace; -webkit-font-smoothing: antialiased; color: #373F43; }
  * { box-sizing: border-box; }
  input, button, textarea, select { font-family: inherit; }
  #__tl_boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F5F0E8; color: #76726A; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    z-index: 9999;
  }
  #__tl_boot.hidden { display: none; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="__tl_boot">laster …</div>
<div id="root"></div>

<!-- 1. Statisk konfig -->
<script src="app/data.js"></script>

<!-- 2. Backend-klient -->
<script src="app/api.js"></script>

<!-- 3. Desktop-komponenter (gir oss C, GROUP_COLOR, Tag, Btn osv. på window) -->
<script type="text/babel" src="app/components.jsx"></script>

<!-- 4. Spond-import-modal -->
<script type="text/babel" src="app/import.jsx"></script>

<!-- 5. Desktop-app -->
<script type="text/babel">
function DesktopApp() {
  const [sessions, setSessions] = React.useState([]);
  const [attendance, setAttendance] = React.useState([]);
  const [members, setMembers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showImport, setShowImport] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [error, setError] = React.useState(null);

  const flashToast = (msg, ms = 3500) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  };

  const load = async () => {
    try {
      const data = await window.TL_API.refresh();
      setSessions(data.sessions || []);
      setAttendance(data.attendance || []);
      setMembers(data.members || []);
      setError(null);
    } catch (err) {
      console.error('[desktop] load feilet:', err);
      setError(err.message || 'kunne ikke nå serveren');
    } finally {
      setLoading(false);
    }
  };

  React.useEffect(() => { load(); }, []);

  const handleApply = async ({ newSessions, updatedAttendance, attendanceMap }) => {
    setShowImport(false);
    flashToast('importerer …', 60000);

    // 1. Opprett nye økter (de Excel-fila har som ikke matchet noe)
    const idMap = {};
    for (const ns of newSessions) {
      try {
        const created = await window.TL_API.createSession({
          date: ns.date, time: ns.time || '', group: ns.group,
          trainer: ns.trainer || '', title: ns.title || '',
          content: ns.content || '', tags: ns.tags || [],
          attendance: ns.attendance,
        });
        idMap[ns.id] = created.id;
      } catch (err) {
        console.error('createSession feilet:', err, ns);
      }
    }

    // 2. Oppdater oppmøte-tall på matchede økter
    for (const [sessionId, count] of Object.entries(updatedAttendance)) {
      try {
        await window.TL_API.updateSession(sessionId, { attendance: count });
      } catch (err) {
        console.error('updateSession feilet:', err, sessionId);
      }
    }

    // 3. Send attendance-rader (oversett midlertidige id-er til ekte server-id-er)
    const rows = [];
    for (const [origId, names] of Object.entries(attendanceMap)) {
      const sessionId = idMap[origId] || origId;
      for (const name of names) rows.push({ sessionId, memberName: name });
    }

    let importResult = { count: 0, newMembers: 0 };
    if (rows.length) {
      try {
        importResult = await window.TL_API.importAttendance(rows);
      } catch (err) {
        console.error('importAttendance feilet:', err);
        flashToast('feil ved import — sjekk konsollen');
        return;
      }
    }

    flashToast(
      `ferdig · ${importResult.count} oppmøter` +
      (importResult.newMembers ? ` · ${importResult.newMembers} nye medlemmer` : '') +
      (newSessions.length ? ` · ${newSessions.length} nye økter` : '')
    );
    await load();
  };

  // ─── Stats ────────────────────────────────────────────────────────
  const stats = React.useMemo(() => {
    const total = attendance.length;
    const uniqueSessions = new Set(attendance.map(a => a.sessionId)).size;
    return { total, uniqueSessions, members: members.length };
  }, [attendance, members]);

  if (loading) return null;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <header style={{
        background: '#F5F0E8', borderBottom: '1px solid #373F43',
        padding: '0 32px', height: 64,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
          <span style={{ fontSize: 14, fontWeight: 700, letterSpacing: '0.18em', color: '#373F43' }}>
            bodø jiu jitsu
          </span>
          <span style={{ fontSize: 8, letterSpacing: '0.18em', color: '#76726A', textTransform: 'uppercase' }}>
            treningslogg · desktop · spond-import
          </span>
        </div>
        <a href="index.html" style={{
          fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: '#76726A', textDecoration: 'none',
        }}>← mobil-app</a>
      </header>

      {/* Body */}
      <div style={{ flex: 1, padding: '40px 32px', maxWidth: 1100, margin: '0 auto', width: '100%' }}>
        <h1 style={{
          fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em', margin: 0,
          fontFamily: 'Inter, system-ui, sans-serif',
        }}>
          Importer oppmøte fra Spond
        </h1>
        <p style={{ fontSize: 13, color: '#76726A', marginTop: 8, lineHeight: 1.6, maxWidth: 640 }}>
          Last opp Excel-fila du eksporterer fra Spond ("oppmøtehistorikk"). Datoer + klassetyper
          matches mot eksisterende økter på dato + gruppe. Nye medlemsnavn registreres automatisk.
        </p>

        {error && (
          <div style={{
            marginTop: 24, padding: 16, border: '1px solid #9E4430',
            color: '#9E4430', fontSize: 12,
          }}>
            ⚠ {error}
          </div>
        )}

        {/* Stat-strip */}
        <div style={{
          marginTop: 32, border: '1px solid #373F43',
          display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
          background: '#F0EBE1',
        }}>
          <Stat label="ØKTER LOGGET" value={sessions.length} />
          <Stat label="OPPMØTER" value={stats.total} />
          <Stat label="MEDLEMMER" value={stats.members} />
          <Stat label="ØKTER M/ OPPMØTE" value={stats.uniqueSessions} last />
        </div>

        {/* Action */}
        <div style={{ marginTop: 32 }}>
          <button onClick={() => setShowImport(true)} style={{
            background: '#AC7A34', color: '#F5F0E8', border: 'none',
            padding: '14px 22px', cursor: 'pointer',
            fontFamily: 'inherit', fontSize: 12, fontWeight: 700, letterSpacing: '0.16em',
            textTransform: 'uppercase',
          }}>
            ↑ last opp spond-eksport
          </button>
        </div>

        {/* Hjelpetekst */}
        <div style={{ marginTop: 48, fontSize: 11, color: '#76726A', lineHeight: 1.8, maxWidth: 640 }}>
          <div style={{ letterSpacing: 1.4, marginBottom: 8, color: '#373F43', fontWeight: 700 }}>
            HVORDAN HENTE FILA FRA SPOND
          </div>
          <ol style={{ paddingLeft: 18, margin: 0 }}>
            <li>Spond-app → gruppen → "Oppmøtehistorikk"</li>
            <li>Velg periode (f.eks. inneværende sesong)</li>
            <li>Eksporter til Excel (.xlsx)</li>
            <li>Drag-and-drop fila i ruta som åpnes når du trykker på knappen over</li>
            <li>Forhåndsvis match → bekreft → ferdig</li>
          </ol>
        </div>

        <div style={{ marginTop: 48, fontSize: 10, color: '#76726A', letterSpacing: 1.4 }}>
          Tips: importen er idempotent — samme fil kan lastes opp på nytt uten å skape dubletter.
        </div>
      </div>

      {showImport && (
        <ImportModal
          onClose={() => setShowImport(false)}
          existingSessions={sessions}
          onApply={handleApply}
        />
      )}

      {toast && (
        <div style={{
          position: 'fixed', bottom: 32, left: '50%', transform: 'translateX(-50%)',
          background: '#121110', color: '#F5F0E8',
          padding: '12px 22px',
          fontSize: 11, fontWeight: 500, letterSpacing: 0.4, textTransform: 'lowercase',
          boxShadow: '0 8px 24px rgba(0,0,0,0.28)',
          zIndex: 300, pointerEvents: 'none',
        }}>{toast}</div>
      )}
    </div>
  );
}

function Stat({ label, value, last }) {
  return (
    <div style={{
      padding: '20px 22px',
      borderRight: last ? 'none' : '1px solid #D8D2C8',
    }}>
      <div style={{ fontSize: 9, letterSpacing: 1.6, color: '#76726A' }}>{label}</div>
      <div style={{ fontSize: 28, marginTop: 6, fontWeight: 400, color: '#373F43' }}>{value}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DesktopApp />);
setTimeout(() => {
  const boot = document.getElementById('__tl_boot');
  if (boot) boot.classList.add('hidden');
}, 300);
</script>

</body>
</html>
