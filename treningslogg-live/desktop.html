<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #141210; color: #F0EAE0;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    -webkit-font-smoothing: antialiased;

  * { box-sizing: border-box; }
  input, button, textarea, select { font-family: inherit; }
  ::selection { background: #CC7A3D; color: #0B0A09; }

  #__tl_boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #141210; color: #8C8278;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    z-index: 9999;
  }
  #__tl_boot.hidden { display: none; }

  /* hover-stater */
  .tl-nav-item { transition: background 120ms ease, color 120ms ease; }
  .tl-nav-item:hover:not(.is-active) { background: rgba(204,122,61,0.08); }
  .tl-period:hover:not(.is-active) { background: rgba(204,122,61,0.12); }
  .tl-card-clickable:hover { border-color: #4A4239 !important; background: #28241F !important; }
</style>

<body>

<div id="__tl_boot">laster …</div>
<div id="root"></div>

<!-- 1. Statisk konfig (grupper, tags, demo-data) -->

<!-- 2. Backend-klient (Sheets via Apps Script) -->
<script src="app/api.js"></script>

<!-- 3. Felles tema + utils + compute (delt med mobil) -->
<script src="app/shared.js"></script>

<!-- 4. Desktop-app -->
<script type="text/babel" src="app/desktop.jsx"></script>

<!-- 5. Mount -->
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<DesktopApp />);
  setTimeout(() => {
    const boot = document.getElementById('__tl_boot');
    if (boot) boot.classList.add('hidden');
  }, 300);
</script>
