<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Treningslogg — Bodø Jiu Jitsu</title>

<!-- PWA / iOS-ikon-config -->
<meta name="description" content="Logg og planlegg økter for Bodø Jiu Jitsu">
<meta name="theme-color" content="#141210">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.webmanifest">

<!-- iOS-spesifikt: gjør "Legg til på Hjemskjerm" til en ekte fullskjerm-app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treningslogg">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

<!-- Vanlig favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<style>
  html, body { margin: 0; background: #141210; font-family: 'Roboto Mono', 'Courier New', monospace; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  input, button, textarea, select { font-family: inherit; }
  input[type=time]::-webkit-calendar-picker-indicator { opacity: 0.6; }
  @keyframes tlToastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* Loading-skjerm før app er klar */
  #__tl_boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #141210; color: #8C8278; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; z-index: 9999;
  }
  #__tl_boot.hidden { display: none; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="__tl_boot">laster …</div>
<div id="root"></div>

<!-- 1. Statisk konfig (grupper, tags, demo-data) -->
<script src="app/data.js"></script>

<!-- 2. Backend-klient (Sheets via Apps Script) -->
<script src="app/api.js"></script>

<!-- 3. Felles tema + utils + compute (delt med desktop) -->
<script src="app/shared.js"></script>

<!-- 4. Tweaks-panel (utseende-justering) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- 5. Hovedapp -->
<script type="text/babel" src="app/mobile.jsx"></script>

<!-- 5. Mount -->
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<MobileApp />);
  // Skjul boot-skjerm når React har rendret
  setTimeout(() => {
    const boot = document.getElementById('__tl_boot');
    if (boot) boot.classList.add('hidden');
  }, 300);
</script>

</body>
</html>
